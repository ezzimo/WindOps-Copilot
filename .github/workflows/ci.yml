name: WindOps Copilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────
  # JOB 1 : Tests Backend Python
  # ─────────────────────────────
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: windops_test
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────
  # JOB 2 : Build Frontend
  # ─────────────────────────────
  build-frontend:
    name: Frontend Build (Node)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────
  # JOB 3 : Build Docker Images
  # ─────────────────────────────
  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t windops-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:8000 \
            -t windops-frontend:ci \
            ./frontend

      - name: Smoke test backend container
        run: |
          docker run -d \
            --name windops-backend-test \
            -p 8000:8000 \
            -e MONGODB_URL=mongodb://localhost:27017 \
            -e OPENAI_API_KEY=dummy-key-for-smoke-test \
            windops-backend:ci
          sleep 5
          curl --fail http://localhost:8000/health || exit 1
          docker stop windops-backend-test
